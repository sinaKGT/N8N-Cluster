services:
  n8n-personal:
    build: .
    container_name: n8n-personal
    restart: always
    environment:
      - N8N_PORT=5678
      - N8N_PATH=/n8n-personal/
      - WEBHOOK_URL=http://localhost/n8n-personal/
      - N8N_EDITOR_BASE_URL=http://localhost/n8n-personal/
    volumes:
      - ../../volumes/n8n-personal:/home/node/.n8n
