events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name localhost;

        # Root location for the frontend portal
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
        }

        # n8n-phd environment
        location /n8n-phd/ {
            rewrite ^/n8n-phd/n8n-phd/(.*) /$1 break;
            proxy_pass http://n8n-phd:5678/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support for n8n UI
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 90;
            


        }

        # n8n-sandbox environment
        location /n8n-sandbox/ {
            rewrite ^/n8n-sandbox/n8n-sandbox/(.*) /$1 break;
            proxy_pass http://n8n-sandbox:5678/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support for n8n UI
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 90;
            


        }

        # n8n-demo environment
        location /n8n-demo/ {
            rewrite ^/n8n-demo/n8n-demo/(.*) /$1 break;
            proxy_pass http://n8n-demo:5678/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support for n8n UI
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 90;
            


        }

        # n8n-personal environment
        location /n8n-personal/ {
            rewrite ^/n8n-personal/n8n-personal/(.*) /$1 break;
            proxy_pass http://n8n-personal:5678/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 90;
        }
    }
}
